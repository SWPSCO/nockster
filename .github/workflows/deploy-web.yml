name: Deploy web (GitHub Pages)

# Builds the web app and publishes it to GitHub Pages at https://my.nockster.com.
#
# The OTA release index + firmware assets are NOT bundled here — they live on
# Cloudflare R2 (published by the firmware-release workflow) and the app fetches
# them at runtime from https://bin.aeroe.io/nockster/updates/latest.json. That
# keeps web deploys (this workflow) from ever overwriting the release channel, so
# this only needs to run when the web sources change.
#
# NOTE: because the index/firmware are now fetched cross-origin, the R2 public
# domain (bin.aeroe.io) must send CORS headers allowing https://my.nockster.com
# (GET + the relevant headers). Configure a CORS rule on the swpsco bucket once.
#
# One-time setup in repo Settings:
#   - Pages -> Build and deployment -> Source: "GitHub Actions"
#   - Pages -> Custom domain: my.nockster.com  (the web/public/CNAME file pins it)
#   - DNS: CNAME my.nockster.com -> <owner>.github.io

on:
  push:
    branches: [master]
    paths:
      - 'web/**'
      - 'nockster-js/**'
      - 'crates/nockster-wasm/**'
      - 'crates/nockster-core/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust (wasm) + wasm-pack
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: wasm-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked || cargo install wasm-pack

      # The wasm crate pulls private SWPSCO git deps (tx-types, ...). Authenticate
      # cargo's git fetch with a scoped token (falls back to the default token).
      - name: Authenticate cargo to private git deps
        env:
          GH_DEPS_TOKEN: ${{ secrets.GH_DEPS_TOKEN || github.token }}
        run: |
          git config --global \
            url."https://x-access-token:${GH_DEPS_TOKEN}@github.com/".insteadOf \
            "https://github.com/"
          echo "CARGO_NET_GIT_FETCH_WITH_CLI=true" >> "$GITHUB_ENV"

      # Build the local workspace artifacts the web app consumes via file: deps.
      - name: Build wasm pkg
        run: wasm-pack build crates/nockster-wasm --target web --out-dir pkg

      - name: Build nockster-js
        working-directory: nockster-js
        run: |
          npm ci
          npm run build

      - name: Build web app
        working-directory: web
        env:
          # OTA index lives on R2 (published by the firmware-release workflow).
          # Overridable in-app (localStorage / advanced panel).
          VITE_NOCKSTER_RELEASE_INDEX_URL: https://bin.aeroe.io/nockster/updates/latest.json
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
