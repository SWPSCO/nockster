name: Desktop release

# Builds release artifacts for:
#   - nockster-cli on Linux x64 and macOS ARM64
#   - the Tauri GUI app on Linux x64, Linux ARM64, and macOS ARM64
#
# macOS signing follows the nockchain release-branch pattern:
#   - APPLE_P12 / APPLE_P12_PASSWORD for Developer ID Application signing via rcodesign
#   - APPLE_INSTALLER_P12 / APPLE_INSTALLER_P12_PASSWORD for pkg signing via rcodesign
#   - AC_API_KEY_ID / AC_API_ISSUER_ID / AC_API_KEY_PATH for rcodesign notarization

on:
  push:
    tags: ['desktop-v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to create, e.g. desktop-v0.1.0. Defaults to desktop-<short-sha>.'
        required: false
      create_release:
        description: 'Create or update the GitHub Release'
        required: false
        default: true
        type: boolean
      generate_provenance:
        description: 'Generate SLSA provenance. Keep disabled while this repo is private.'
        required: false
        default: false
        type: boolean
      build_linux_x64:
        description: 'Build Linux x64 CLI, deb, and AppImage'
        required: false
        default: true
        type: boolean
      build_linux_aarch64:
        description: 'Build Linux ARM64 AppImage'
        required: false
        default: true
        type: boolean
      build_macos_aarch64:
        description: 'Build macOS ARM64 signed artifacts'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  actions: read
  id-token: write

env:
  WASM_TOOLCHAIN: nightly-2026-06-06
  WASM_TARGET: wasm32-unknown-unknown
  LINUX_TARGET: x86_64-unknown-linux-gnu
  LINUX_ARM64_TARGET: aarch64-unknown-linux-gnu
  MACOS_TARGET: aarch64-apple-darwin
  MACOS_TEAM_ID: 484J85QW9N

jobs:
  vars:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.set.outputs.app_version }}
      release_tag: ${{ steps.set.outputs.release_tag }}
      short_sha: ${{ steps.set.outputs.short_sha }}
      should_release: ${{ steps.set.outputs.should_release }}
      version_label: ${{ steps.set.outputs.version_label }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag and versions
        id: set
        run: |
          set -euo pipefail

          SHORT_SHA="$(git rev-parse HEAD | cut -c1-7)"
          APP_VERSION="$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' src-tauri/tauri.conf.json | head -1)"
          if [[ -z "$APP_VERSION" ]]; then
            echo "::error::could not read src-tauri/tauri.conf.json version"
            exit 1
          fi

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            RELEASE_TAG="${{ github.ref_name }}"
          elif [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            RELEASE_TAG="${{ github.event.inputs.release_tag }}"
          else
            RELEASE_TAG="desktop-${SHORT_SHA}"
          fi

          VERSION_LABEL="${RELEASE_TAG#desktop-v}"
          if [[ "$VERSION_LABEL" == "$RELEASE_TAG" ]]; then
            VERSION_LABEL="$RELEASE_TAG"
          fi

          SHOULD_RELEASE="false"
          if [[ "${{ github.event_name }}" == "push" || "${{ github.event.inputs.create_release }}" == "true" ]]; then
            SHOULD_RELEASE="true"
          fi

          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          echo "version_label=$VERSION_LABEL" >> "$GITHUB_OUTPUT"

  build-linux-x64:
    name: Build Linux x64
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_linux_x64 }}
    runs-on: ['self-hosted', 'Linux', 'X64']
    container:
      image: ubuntu:22.04
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
    steps:
      - name: Install Linux build dependencies
        run: |
          set -euo pipefail
          apt-get update
          if apt-cache show libfuse2 >/dev/null 2>&1; then
            FUSE_PACKAGE=libfuse2
          else
            FUSE_PACKAGE=libfuse2t64
          fi
          apt-get install -y \
            build-essential \
            ca-certificates \
            curl \
            file \
            git \
            libayatana-appindicator3-dev \
            libclang-dev \
            libssl-dev \
            libudev-dev \
            libusb-1.0-0-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            protobuf-compiler \
            librsvg2-dev \
            unzip \
            wget \
            xdg-utils \
            zip \
            "$FUSE_PACKAGE"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.WASM_TOOLCHAIN }}
          targets: ${{ env.LINUX_TARGET }},${{ env.WASM_TARGET }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          key: desktop-linux-${{ env.LINUX_TARGET }}

      - name: Authenticate cargo to private git deps
        env:
          GH_DEPS_TOKEN: ${{ secrets.GH_DEPS_TOKEN || github.token }}
        run: |
          set -euo pipefail
          git config --global \
            url."https://x-access-token:${GH_DEPS_TOKEN}@github.com/".insteadOf \
            "https://github.com/"
          echo "CARGO_NET_GIT_FETCH_WITH_CLI=true" >> "$GITHUB_ENV"

      - name: Install release tools
        run: |
          set -euo pipefail
          cargo install tauri-cli --version 2.8.4 --locked
          cargo install wasm-pack --locked || cargo install wasm-pack

      - name: Build CLI
        run: cargo build -p nockster-cli --release --target "$LINUX_TARGET" --locked

      - name: Build web assets
        run: |
          set -euo pipefail
          wasm-pack build crates/nockster-wasm --target web --out-dir pkg
          npm ci --prefix nockster-js
          npm run build --prefix nockster-js
          npm ci --prefix web
          npm run build --prefix web

      - name: Build Tauri GUI
        working-directory: src-tauri
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: |
          cargo tauri build \
            --target "$LINUX_TARGET" \
            --bundles deb,appimage \
            --config '{"build":{"beforeBuildCommand":"true","frontendDist":"../web/dist"}}'

      - name: Package Linux artifacts
        run: |
          set -euo pipefail
          mkdir -p dist

          CLI_BIN="target/${LINUX_TARGET}/release/nockster-cli"
          if [[ ! -x "$CLI_BIN" ]]; then
            echo "::error::missing CLI binary at $CLI_BIN"
            exit 1
          fi
          cp "$CLI_BIN" dist/nockster-cli
          chmod +x dist/nockster-cli
          (cd dist && zip -9 nockster-cli-linux-x64.zip nockster-cli)
          rm dist/nockster-cli

          count=0
          for root in \
            "target/${LINUX_TARGET}/release/bundle" \
            "src-tauri/target/${LINUX_TARGET}/release/bundle" \
            "target/release/bundle" \
            "src-tauri/target/release/bundle"; do
            [[ -d "$root" ]] || continue
            while IFS= read -r bundle; do
              case "$bundle" in
                *.deb)
                  cp "$bundle" dist/nockster-gui-linux-x64.deb
                  count=$((count + 1))
                  ;;
                *.AppImage)
                  cp "$bundle" dist/nockster-gui-linux-x64.AppImage
                  chmod +x dist/nockster-gui-linux-x64.AppImage
                  count=$((count + 1))
                  ;;
              esac
            done < <(find "$root" -type f \( -name '*.deb' -o -name '*.AppImage' \) | sort)
          done

          if [[ "$count" -eq 0 ]]; then
            echo "::error::no Linux Tauri bundle artifacts were found"
            find target src-tauri/target -maxdepth 6 -type f 2>/dev/null || true
            exit 1
          fi

          ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-x64
          path: dist/*

  build-linux-aarch64:
    name: Build Linux ARM64 AppImage
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_linux_aarch64 }}
    runs-on: ubuntu-24.04-arm
    container:
      image: ubuntu:22.04
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
    steps:
      - name: Install Linux build dependencies
        run: |
          set -euo pipefail
          apt-get update
          if apt-cache show libfuse2 >/dev/null 2>&1; then
            FUSE_PACKAGE=libfuse2
          else
            FUSE_PACKAGE=libfuse2t64
          fi
          apt-get install -y \
            build-essential \
            ca-certificates \
            curl \
            file \
            git \
            libayatana-appindicator3-dev \
            libclang-dev \
            libssl-dev \
            libudev-dev \
            libusb-1.0-0-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            protobuf-compiler \
            librsvg2-dev \
            unzip \
            wget \
            xdg-utils \
            zip \
            "$FUSE_PACKAGE"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.WASM_TOOLCHAIN }}
          targets: ${{ env.LINUX_ARM64_TARGET }},${{ env.WASM_TARGET }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          key: desktop-linux-${{ env.LINUX_ARM64_TARGET }}

      - name: Authenticate cargo to private git deps
        env:
          GH_DEPS_TOKEN: ${{ secrets.GH_DEPS_TOKEN || github.token }}
        run: |
          set -euo pipefail
          git config --global \
            url."https://x-access-token:${GH_DEPS_TOKEN}@github.com/".insteadOf \
            "https://github.com/"
          echo "CARGO_NET_GIT_FETCH_WITH_CLI=true" >> "$GITHUB_ENV"

      - name: Install release tools
        run: |
          set -euo pipefail
          cargo install tauri-cli --version 2.8.4 --locked
          cargo install wasm-pack --locked || cargo install wasm-pack

      - name: Build CLI
        run: cargo build -p nockster-cli --release --target "$LINUX_ARM64_TARGET" --locked

      - name: Build web assets
        run: |
          set -euo pipefail
          wasm-pack build crates/nockster-wasm --target web --out-dir pkg
          npm ci --prefix nockster-js
          npm run build --prefix nockster-js
          npm ci --prefix web
          npm run build --prefix web

      - name: Build Tauri AppImage
        working-directory: src-tauri
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: |
          cargo tauri build \
            --target "$LINUX_ARM64_TARGET" \
            --bundles appimage \
            --config '{"build":{"beforeBuildCommand":"true","frontendDist":"../web/dist"}}'

      - name: Package Linux ARM64 artifacts
        run: |
          set -euo pipefail
          mkdir -p dist

          CLI_BIN="target/${LINUX_ARM64_TARGET}/release/nockster-cli"
          if [[ ! -x "$CLI_BIN" ]]; then
            echo "::error::missing CLI binary at $CLI_BIN"
            exit 1
          fi
          cp "$CLI_BIN" dist/nockster-cli
          chmod +x dist/nockster-cli
          (cd dist && zip -9 nockster-cli-linux-aarch64.zip nockster-cli)
          rm dist/nockster-cli

          count=0
          for root in \
            "target/${LINUX_ARM64_TARGET}/release/bundle" \
            "src-tauri/target/${LINUX_ARM64_TARGET}/release/bundle" \
            "target/release/bundle" \
            "src-tauri/target/release/bundle"; do
            [[ -d "$root" ]] || continue
            while IFS= read -r bundle; do
              case "$bundle" in
                *.AppImage)
                  cp "$bundle" dist/nockster-gui-linux-aarch64.AppImage
                  chmod +x dist/nockster-gui-linux-aarch64.AppImage
                  count=$((count + 1))
                  ;;
              esac
            done < <(find "$root" -type f -name '*.AppImage' | sort)
          done

          if [[ "$count" -eq 0 ]]; then
            echo "::error::no Linux ARM64 AppImage artifact was found"
            find target src-tauri/target -maxdepth 6 -type f 2>/dev/null || true
            exit 1
          fi

          ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-aarch64
          path: dist/*

  build-macos-aarch64:
    name: Build macOS ARM64
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_macos_aarch64 }}
    runs-on: [self-hosted, macOS, ARM64]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.WASM_TOOLCHAIN }}
          targets: ${{ env.MACOS_TARGET }},${{ env.WASM_TARGET }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          key: desktop-macos-${{ env.MACOS_TARGET }}

      - name: Authenticate cargo to private git deps
        env:
          GH_DEPS_TOKEN: ${{ secrets.GH_DEPS_TOKEN || github.token }}
        run: |
          set -euo pipefail
          git config --global \
            url."https://x-access-token:${GH_DEPS_TOKEN}@github.com/".insteadOf \
            "https://github.com/"
          echo "CARGO_NET_GIT_FETCH_WITH_CLI=true" >> "$GITHUB_ENV"

      - name: Install release tools
        run: |
          set -euo pipefail
          cargo install tauri-cli --version 2.8.4 --locked
          cargo install wasm-pack --locked || cargo install wasm-pack
          cargo install apple-codesign --version 0.29.0 --locked --bin rcodesign

      - name: Build CLI
        run: cargo build -p nockster-cli --release --target "$MACOS_TARGET" --locked

      - name: Build web assets
        run: |
          set -euo pipefail
          wasm-pack build crates/nockster-wasm --target web --out-dir pkg
          npm ci --prefix nockster-js
          npm run build --prefix nockster-js
          npm ci --prefix web
          npm run build --prefix web

      - name: Build Tauri app bundle
        working-directory: src-tauri
        run: |
          cargo tauri build \
            --target "$MACOS_TARGET" \
            --bundles app \
            --config '{"build":{"beforeBuildCommand":"true","frontendDist":"../web/dist"}}'

      - name: Sign and notarize macOS artifacts with rcodesign
        env:
          APPLE_P12: ${{ secrets.APPLE_P12 }}
          APPLE_P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
          APPLE_INSTALLER_P12: ${{ secrets.APPLE_INSTALLER_P12 }}
          APPLE_INSTALLER_P12_PASSWORD: ${{ secrets.APPLE_INSTALLER_P12_PASSWORD }}
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY_PATH: ${{ secrets.AC_API_KEY_PATH }}
        run: |
          set -euo pipefail

          cleanup_signing_files() {
            rm -rf \
              app-signing.p12 \
              app-signing.pass \
              installer-signing.p12 \
              installer-signing.pass \
              key.p8 \
              app-store-connect-key.json \
              pkgroot \
              nockster-cli-unsigned.pkg \
              Entitlements.plist
          }
          trap cleanup_signing_files EXIT

          for name in APPLE_P12 APPLE_P12_PASSWORD APPLE_INSTALLER_P12 APPLE_INSTALLER_P12_PASSWORD AC_API_KEY_ID AC_API_ISSUER_ID AC_API_KEY_PATH; do
            if [[ -z "${!name}" ]]; then
              echo "::error::missing GitHub Actions secret $name"
              echo "::error::if this is an organization secret, confirm it grants access to this repository and this workflow trigger"
              exit 1
            fi
          done

          decode_b64() {
            local value="$1"
            local out="$2"
            if ! printf '%s' "$value" | base64 --decode > "$out" 2>/dev/null; then
              printf '%s' "$value" | base64 -D > "$out"
            fi
          }

          decode_b64 "$APPLE_P12" app-signing.p12
          decode_b64 "$APPLE_INSTALLER_P12" installer-signing.p12
          decode_b64 "$AC_API_KEY_PATH" key.p8
          printf '%s' "$APPLE_P12_PASSWORD" > app-signing.pass
          printf '%s' "$APPLE_INSTALLER_P12_PASSWORD" > installer-signing.pass
          chmod 600 app-signing.p12 installer-signing.p12 app-signing.pass installer-signing.pass key.p8
          rcodesign encode-app-store-connect-api-key \
            --output-path app-store-connect-key.json \
            "$AC_API_ISSUER_ID" \
            "$AC_API_KEY_ID" \
            key.p8

          cat > Entitlements.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.cs.allow-jit</key>
              <true/>
              <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
              <true/>
              <key>com.apple.security.cs.disable-executable-page-protection</key>
              <true/>
              <key>com.apple.security.cs.allow-dyld-environment-variables</key>
              <true/>
          </dict>
          </plist>
          EOF

          CLI_BIN="target/${MACOS_TARGET}/release/nockster-cli"
          if [[ ! -x "$CLI_BIN" ]]; then
            echo "::error::missing CLI binary at $CLI_BIN"
            exit 1
          fi

          APP_BUNDLE=""
          for root in \
            "target/${MACOS_TARGET}/release/bundle" \
            "src-tauri/target/${MACOS_TARGET}/release/bundle" \
            "target/release/bundle" \
            "src-tauri/target/release/bundle"; do
            [[ -d "$root" ]] || continue
            candidate="$(find "$root" -type d -name 'Nockster.app' -print -quit)"
            if [[ -n "$candidate" ]]; then
              APP_BUNDLE="$candidate"
              break
            fi
          done
          if [[ -z "$APP_BUNDLE" ]]; then
            echo "::error::could not find Nockster.app"
            find target src-tauri/target -maxdepth 7 -type d 2>/dev/null || true
            exit 1
          fi

          rcodesign sign \
            --p12-file app-signing.p12 \
            --p12-password-file app-signing.pass \
            --team-name "$MACOS_TEAM_ID" \
            --code-signature-flags runtime \
            --entitlements-xml-path ./Entitlements.plist \
            "$CLI_BIN"
          rcodesign verify "$CLI_BIN"

          rcodesign sign \
            --p12-file app-signing.p12 \
            --p12-password-file app-signing.pass \
            --team-name "$MACOS_TEAM_ID" \
            --code-signature-flags runtime \
            --entitlements-xml-path ./Entitlements.plist \
            "$APP_BUNDLE"
          rcodesign verify "$APP_BUNDLE"

          mkdir -p dist pkgroot
          tar -czf dist/nockster-cli-macos-aarch64.tar.gz -C "$(dirname "$CLI_BIN")" nockster-cli

          rm -rf pkgroot
          mkdir -p pkgroot/usr/local/bin
          cp "$CLI_BIN" pkgroot/usr/local/bin/nockster-cli
          APP_VERSION="$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' src-tauri/tauri.conf.json | head -1)"
          if [[ -z "$APP_VERSION" ]]; then
            echo "::error::could not read src-tauri/tauri.conf.json version"
            exit 1
          fi
          pkgbuild --root pkgroot \
            --identifier io.swps.nockster-cli.pkg \
            --version "$APP_VERSION" \
            --install-location / \
            nockster-cli-unsigned.pkg
          cp nockster-cli-unsigned.pkg dist/nockster-cli-macos-aarch64.pkg
          rcodesign sign \
            --p12-file installer-signing.p12 \
            --p12-password-file installer-signing.pass \
            --team-name "$MACOS_TEAM_ID" \
            dist/nockster-cli-macos-aarch64.pkg

          hdiutil create \
            -volname "Nockster" \
            -srcfolder "$APP_BUNDLE" \
            -ov \
            -format UDZO \
            dist/nockster-gui-macos-aarch64.dmg
          rcodesign sign \
            --p12-file app-signing.p12 \
            --p12-password-file app-signing.pass \
            --team-name "$MACOS_TEAM_ID" \
            dist/nockster-gui-macos-aarch64.dmg

          if rcodesign notary-submit --help | grep -q -- '--api-key-file'; then
            NOTARY_API_KEY_ARG="--api-key-file"
          else
            NOTARY_API_KEY_ARG="--api-key-path"
          fi
          for artifact in dist/nockster-cli-macos-aarch64.pkg dist/nockster-gui-macos-aarch64.dmg; do
            rcodesign notary-submit \
              "$NOTARY_API_KEY_ARG" app-store-connect-key.json \
              --max-wait-seconds 1800 \
              --staple \
              "$artifact"
          done
          cleanup_signing_files

          ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-aarch64
          path: dist/*

  package:
    name: Package release artifacts
    needs: [vars, build-linux-x64, build-linux-aarch64, build-macos-aarch64]
    if: ${{ always() && !cancelled() && !contains(needs.*.result, 'failure') && (needs.build-linux-x64.result == 'success' || needs.build-linux-aarch64.result == 'success' || needs.build-macos-aarch64.result == 'success') }}
    runs-on: ubuntu-latest
    outputs:
      content_hashes: ${{ steps.content-hash.outputs.content_hashes }}
    steps:
      - uses: actions/download-artifact@v4
        if: ${{ needs.build-linux-x64.result == 'success' }}
        with:
          name: desktop-linux-x64
          path: ./linux

      - uses: actions/download-artifact@v4
        if: ${{ needs.build-linux-aarch64.result == 'success' }}
        with:
          name: desktop-linux-aarch64
          path: ./linux-arm64

      - uses: actions/download-artifact@v4
        if: ${{ needs.build-macos-aarch64.result == 'success' }}
        with:
          name: desktop-macos-aarch64
          path: ./macos

      - name: Collate artifacts
        run: |
          set -euo pipefail
          mkdir -p out
          for dir in linux linux-arm64 macos; do
            if compgen -G "$dir/*" >/dev/null; then
              cp "$dir"/* out/
            fi
          done
          if ! compgen -G "out/*" >/dev/null; then
            echo "::error::no platform artifacts were downloaded"
            exit 1
          fi
          ls -la out

      - name: Compute content hashes
        id: content-hash
        run: |
          set -euo pipefail
          files="$(find out -type f | sort)"
          if [[ -z "$files" ]]; then
            echo "::error::no packaged artifacts found"
            exit 1
          fi
          echo "content_hashes=$(sha256sum $files | base64 -w0)" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: packaged-desktop-release
          path: out/*

  provenance:
    name: Generate SLSA provenance
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.generate_provenance }}
    needs: package
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    permissions:
      actions: read
      id-token: write
      contents: write
    with:
      base64-subjects: ${{ needs.package.outputs.content_hashes }}
      upload-assets: false

  release:
    name: Publish GitHub release
    if: ${{ always() && needs.vars.outputs.should_release == 'true' && needs.package.result == 'success' && (needs.provenance.result == 'success' || needs.provenance.result == 'skipped') }}
    needs: [vars, package, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: packaged-desktop-release
          path: ./out

      - name: Download provenance
        if: ${{ needs.provenance.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.provenance.outputs.provenance-name }}
          path: ./prov

      - name: Create release notes
        env:
          PROVENANCE_ATTACHED: ${{ needs.provenance.result == 'success' }}
        run: |
          set -euo pipefail
          cat > README.md <<'EOF'
          ## Artifacts

          EOF
          if [[ -f out/nockster-cli-linux-x64.zip ]]; then
            echo '- `nockster-cli-linux-x64.zip`: Linux x64 CLI binary.' >> README.md
          fi
          if [[ -f out/nockster-cli-linux-aarch64.zip ]]; then
            echo '- `nockster-cli-linux-aarch64.zip`: Linux ARM64 CLI binary.' >> README.md
          fi
          if [[ -f out/nockster-gui-linux-x64.deb ]]; then
            echo '- `nockster-gui-linux-x64.deb`: Linux x64 Tauri desktop app for Debian/Ubuntu.' >> README.md
          fi
          if [[ -f out/nockster-gui-linux-x64.AppImage ]]; then
            echo '- `nockster-gui-linux-x64.AppImage`: Linux x64 Tauri desktop app.' >> README.md
          fi
          if [[ -f out/nockster-gui-linux-aarch64.AppImage ]]; then
            echo '- `nockster-gui-linux-aarch64.AppImage`: Linux ARM64 Tauri desktop app.' >> README.md
          fi
          if [[ -f out/nockster-cli-macos-aarch64.pkg ]]; then
            echo '- `nockster-cli-macos-aarch64.pkg`: signed and notarized macOS ARM64 CLI installer.' >> README.md
          fi
          if [[ -f out/nockster-cli-macos-aarch64.tar.gz ]]; then
            echo '- `nockster-cli-macos-aarch64.tar.gz`: signed macOS ARM64 CLI binary.' >> README.md
          fi
          if [[ -f out/nockster-gui-macos-aarch64.dmg ]]; then
            echo '- `nockster-gui-macos-aarch64.dmg`: signed and notarized macOS ARM64 Tauri desktop app.' >> README.md
          fi
          cat >> README.md <<'EOF'

          ## Verification

          EOF
          if [[ "$PROVENANCE_ATTACHED" == "true" ]]; then
            echo 'SLSA provenance for the packaged artifacts is attached as `multiple.intoto.jsonl`.' >> README.md
          else
            echo 'SLSA provenance was not generated for this release.' >> README.md
          fi

      - name: Stage release files
        run: |
          set -euo pipefail
          mkdir -p release-files
          cp out/* release-files/
          cp README.md release-files/
          if compgen -G "prov/*" >/dev/null; then
            cp prov/* release-files/
          fi
          ls -la release-files

      - uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.vars.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: Desktop ${{ needs.vars.outputs.version_label }}
          draft: false
          files: release-files/*
