name: Firmware release

# Builds + signs a Nockster firmware release INSIDE a container (docker/firmware/
# Dockerfile) for portability/reproducibility, then publishes a GitHub Release with:
#   - nockster-fw.bin            (raw OTA image, built --release)
#   - nockster-fw.update.json    (signed update bundle/manifest)
#   - latest.json                (OTA release index; relative asset URLs)
#
# These are ALSO published to Cloudflare R2 (r2:swpsco/nockster/updates/) and served
# at https://bin.aeroe.io/nockster/updates/latest.json. The web app fetches the index
# from there at runtime, so the OTA channel is decoupled from the GitHub Pages deploy
# (web commits to master no longer overwrite the release index).
#
# Trigger: push a tag `fw-v<N>` (N = integer release version baked into the image,
# e.g. `fw-v7`), or run manually.
#
# Required repo secrets:
#   UPDATE_SIGNING_KEY  — firmware update signing key (hex or raw, per nockster-cli).
#                         Must match the fixed on-device trust anchor below.
#   RCLONE_B64          — base64-encoded rclone.conf with an `r2:` remote for the
#                         swpsco bucket (same secret used by other SWPSCO repos).

env:
  NOCKSTER_UPDATE_PUBKEY_SHA256_HEX: 5aa46209222080a2ce107e25d427c3d9ada6cb77be25d7d2a3df8959b7fa2602

on:
  push:
    tags: ['fw-v*']
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Integer firmware release version (u32)'
        required: true
      build_profile:
        description: 'Build profile'
        type: choice
        default: production
        options: [production, chip-security, dev]

permissions:
  contents: write

jobs:
  build-sign-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version + profile
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.release_version }}" ]; then
            VER="${{ github.event.inputs.release_version }}"
            PROFILE="${{ github.event.inputs.build_profile }}"
            TAG="fw-v${VER}"
          else
            TAG="${GITHUB_REF_NAME}"
            VER="${TAG#fw-v}"
            PROFILE="production"
          fi
          if ! [[ "$VER" =~ ^[0-9]+$ ]]; then
            echo "::error::release version must be an integer (got '$VER' from tag '$TAG')"
            exit 1
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "profile=$PROFILE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Write signing key (host, outside repo)
        env:
          UPDATE_SIGNING_KEY: ${{ secrets.UPDATE_SIGNING_KEY }}
        run: |
          if [ -z "$UPDATE_SIGNING_KEY" ]; then
            echo "::error::missing repo secret UPDATE_SIGNING_KEY"
            exit 1
          fi
          printf '%s' "$UPDATE_SIGNING_KEY" > "$RUNNER_TEMP/signing.key"

      - name: Build firmware builder image
        run: docker build -t nockster-fw -f docker/firmware/Dockerfile .

      - name: Build + sign firmware (in container, --release)
        env:
          GIT_AUTH_TOKEN: ${{ secrets.GH_DEPS_TOKEN || github.token }}
        run: |
          mkdir -p out && chmod 777 out
          docker run --rm \
            -e GIT_AUTH_TOKEN \
            -e RELEASE_VERSION="${{ steps.meta.outputs.version }}" \
            -e FW_PROFILE="${{ steps.meta.outputs.profile }}" \
            -e NOCKSTER_UPDATE_PUBKEY_SHA256_HEX \
            -v "$RUNNER_TEMP/signing.key:/keys/signing.key:ro" \
            -v "$PWD/out:/out" \
            nockster-fw

      - name: Publish GitHub Release (host)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            out/nockster-fw.bin \
            out/nockster-fw.update.json \
            out/latest.json \
            --title "Firmware ${{ steps.meta.outputs.tag }}" \
            --notes "Signed Nockster firmware — release version ${{ steps.meta.outputs.version }}, profile ${{ steps.meta.outputs.profile }}, trust anchor ${NOCKSTER_UPDATE_PUBKEY_SHA256_HEX}." \
            --generate-notes

      - name: Publish OTA assets to R2
        env:
          RCLONE_B64: ${{ secrets.RCLONE_B64 }}
        run: |
          if [ -z "$RCLONE_B64" ]; then
            echo "::error::missing repo secret RCLONE_B64"
            exit 1
          fi
          curl https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          echo "$RCLONE_B64" | base64 -d > ~/.config/rclone/rclone.conf
          # Upload the assets first, then the index last, so the index never
          # references an object that hasn't landed yet.
          rclone copy out/nockster-fw.bin         r2:swpsco/nockster/updates/ --progress
          rclone copy out/nockster-fw.update.json r2:swpsco/nockster/updates/ --progress
          rclone copy out/latest.json             r2:swpsco/nockster/updates/ --progress
