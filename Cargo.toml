nockvm = { git = "https://github.com/SWPSCO/tx-types.git", rev = "fede30fa63ad555d1125cf2131dadc2e8e62e983" }
nockchain-libp2p-io = { git = "https://github.com/SWPSCO/tx-types.git", rev = "fede30fa63ad555d1125cf2131dadc2e8e62e983" }
nockchain-math = { git = "https://github.com/SWPSCO/tx-types.git", rev = "fede30fa63ad555d1125cf2131dadc2e8e62e983" }
zkvm-jetpack = { git = "https://github.com/SWPSCO/tx-types.git", rev = "fede30fa63ad555d1125cf2131dadc2e8e62e983" }
ibig = { git = "https://github.com/SWPSCO/tx-types.git", rev = "fede30fa63ad555d1125cf2131dadc2e8e62e983" }
murmur3 = { git = "https://github.com/SWPSCO/tx-types.git", rev = "fede30fa63ad555d1125cf2131dadc2e8e62e983" }
nockvm_macros = { git = "https://github.com/SWPSCO/tx-types.git", rev = "fede30fa63ad555d1125cf2131dadc2e8e62e983" }

